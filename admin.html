<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin · Admissions Panel</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ===== ADMIN PANEL CSS ===== */
      :root {
        --font-ui:
          "Inter", system-ui, -apple-system, "Segoe UI", Roboto,
          "Helvetica Neue", Arial;
        --bg-primary: #000000;
        --bg-card: #0a0a0a;
        --bg-surface: rgba(255, 255, 255, 0.04);
        --border-color: rgba(255, 255, 255, 0.08);
        --text-primary: #ffffff;
        --text-secondary: rgba(255, 255, 255, 0.6);
        --accent: #ffc107;
        --accent-dim: rgba(255, 193, 7, 0.12);
        --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        --radius: 16px;
        --radius-sm: 10px;
        --danger: #ef4444;
        --success: #22c55e;
        --blue: #3b82f6;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-ui);
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        padding: 1.5rem;
      }

      .admin-container {
        max-width: 1440px;
        margin: 0 auto;
        background: var(--bg-card);
        border-radius: var(--radius);
        padding: 2rem;
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow);
      }

      .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem;
        margin-bottom: 2rem;
        padding-bottom: 1.2rem;
        border-bottom: 1px solid var(--border-color);
      }

      .admin-header-left {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .admin-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: -0.02em;
      }

      .admin-header h1 span {
        color: var(--accent);
      }

      .admin-stats {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        flex-wrap: wrap;
      }

      .stat-badge {
        background: var(--accent-dim);
        color: var(--accent);
        padding: 0.45rem 1.2rem;
        border-radius: 20px;
        font-weight: 600;
        font-size: 0.85rem;
        border: 1px solid rgba(255, 193, 7, 0.15);
        white-space: nowrap;
      }

      .stat-badge strong {
        font-size: 1.1rem;
      }

      .btn-export {
        background: var(--accent);
        color: #000000;
        border: none;
        padding: 0.5rem 1.5rem;
        border-radius: var(--radius-sm);
        font-weight: 700;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.2s;
        font-family: var(--font-ui);
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }

      .btn-export:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px -6px rgba(255, 193, 7, 0.3);
      }

      .btn-refresh {
        background: var(--bg-surface);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
        padding: 0.5rem 1.2rem;
        border-radius: var(--radius-sm);
        font-weight: 500;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.2s;
        font-family: var(--font-ui);
      }

      .btn-refresh:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      .search-bar {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }

      .search-bar input {
        flex: 1;
        min-width: 200px;
        padding: 0.7rem 1rem;
        background: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-sm);
        color: var(--text-primary);
        font-size: 0.9rem;
        font-family: var(--font-ui);
        transition: all 0.2s;
        outline: none;
      }

      .search-bar input:focus {
        border-color: var(--accent);
        background: rgba(255, 255, 255, 0.06);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }

      .search-bar input::placeholder {
        color: var(--text-secondary);
      }

      .table-wrapper {
        overflow-x: auto;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border-color);
        background: var(--bg-surface);
        position: relative;
        min-height: 300px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.88rem;
        min-width: 900px;
      }

      thead {
        background: rgba(255, 255, 255, 0.03);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      th {
        text-align: left;
        padding: 0.9rem 1rem;
        font-weight: 600;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-secondary);
        border-bottom: 2px solid var(--border-color);
        white-space: nowrap;
        background: #0a0a0a;
      }

      td {
        padding: 0.85rem 1rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        vertical-align: middle;
        color: var(--text-primary);
      }

      tr:hover td {
        background: rgba(255, 255, 255, 0.03);
      }

      tr:last-child td {
        border-bottom: none;
      }

      .badge {
        display: inline-block;
        padding: 0.2rem 0.75rem;
        border-radius: 12px;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }

      .badge-course {
        background: var(--accent-dim);
        color: var(--accent);
        border: 1px solid rgba(255, 193, 7, 0.15);
      }

      .badge-school {
        background: rgba(59, 130, 246, 0.15);
        color: #60a5fa;
        border: 1px solid rgba(59, 130, 246, 0.15);
      }

      .badge-college {
        background: rgba(52, 211, 153, 0.15);
        color: #34d399;
        border: 1px solid rgba(52, 211, 153, 0.15);
      }

      .badge-graduate {
        background: rgba(251, 191, 36, 0.15);
        color: #fbbf24;
        border: 1px solid rgba(251, 191, 36, 0.15);
      }

      .badge-other {
        background: rgba(255, 255, 255, 0.06);
        color: var(--text-secondary);
        border: 1px solid var(--border-color);
      }

      .loading-state,
      .error-state,
      .no-data-state {
        text-align: center;
        padding: 3rem 1.5rem;
        color: var(--text-secondary);
      }

      .loading-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }

      .loading-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--border-color);
        border-top: 3px solid var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error-state {
        color: #f87171;
      }

      .error-state .error-icon {
        font-size: 2rem;
        margin-bottom: 0.5rem;
      }

      .no-data-state .empty-icon {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
      }

      .admin-toast {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        padding: 0.8rem 1.5rem;
        border-radius: var(--radius-sm);
        font-weight: 500;
        font-size: 0.9rem;
        box-shadow: var(--shadow);
        z-index: 999;
        animation: slideUp 0.3s ease;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .admin-toast.success {
        border-color: rgba(52, 211, 153, 0.3);
      }
      .admin-toast.error {
        border-color: rgba(248, 113, 113, 0.3);
      }

      .view-btn {
        background: var(--bg-surface);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
        padding: 0.2rem 0.8rem;
        border-radius: 6px;
        font-size: 0.7rem;
        cursor: pointer;
        font-family: var(--font-ui);
        transition: all 0.2s;
      }

      .view-btn:hover {
        background: var(--accent-dim);
        border-color: var(--accent);
        color: var(--accent);
      }

      /* Modal for viewing details */
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        padding: 1rem;
      }

      .modal-overlay.active {
        display: flex;
      }

      .modal-content {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        max-width: 600px;
        width: 100%;
        max-height: 80vh;
        overflow-y: auto;
        padding: 2rem;
        position: relative;
        box-shadow: var(--shadow);
      }

      .modal-close {
        position: absolute;
        top: 1rem;
        right: 1rem;
        background: var(--bg-surface);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 1.2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      .modal-close:hover {
        background: var(--danger);
        border-color: var(--danger);
      }

      .modal-field {
        margin-bottom: 0.8rem;
        display: flex;
        gap: 0.5rem;
      }

      .modal-field-label {
        color: var(--text-secondary);
        font-weight: 600;
        min-width: 120px;
        font-size: 0.85rem;
      }

      .modal-field-value {
        color: var(--text-primary);
        font-size: 0.85rem;
        word-break: break-word;
      }

      .modal-title {
        font-size: 1.3rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
        color: var(--accent);
      }

      @media (max-width: 768px) {
        body {
          padding: 0.75rem;
        }
        .admin-container {
          padding: 1rem;
          border-radius: var(--radius-sm);
        }
        .admin-header {
          flex-direction: column;
          align-items: stretch;
          gap: 0.8rem;
        }
        .admin-header h1 {
          font-size: 1.2rem;
        }
        .admin-stats {
          justify-content: space-between;
        }
        .stat-badge {
          font-size: 0.75rem;
          padding: 0.3rem 0.8rem;
        }
        .btn-export,
        .btn-refresh {
          font-size: 0.75rem;
          padding: 0.4rem 1rem;
        }
        .search-bar input {
          font-size: 0.85rem;
          padding: 0.6rem 0.8rem;
        }
        table {
          font-size: 0.8rem;
          min-width: 700px;
        }
        th,
        td {
          padding: 0.6rem 0.7rem;
        }
        .badge {
          font-size: 0.6rem;
          padding: 0.15rem 0.6rem;
        }
        .modal-content {
          padding: 1.5rem;
        }
        .modal-field {
          flex-direction: column;
          gap: 0.2rem;
        }
        .modal-field-label {
          min-width: auto;
        }
      }

      @media (max-width: 480px) {
        .admin-container {
          padding: 0.75rem;
        }
        .admin-stats {
          flex-wrap: wrap;
          gap: 0.5rem;
        }
        .stat-badge {
          font-size: 0.7rem;
        }
        table {
          font-size: 0.7rem;
          min-width: 600px;
        }
        th,
        td {
          padding: 0.4rem 0.5rem;
        }
      }

      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
        background: #000000;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 193, 7, 0.2);
        border-radius: 20px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 193, 7, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="admin-container">
      <!-- HEADER -->
      <div class="admin-header">
        <div class="admin-header-left">
          <h1>📋 <span>Admissions</span></h1>
        </div>
        <div class="admin-stats">
          <span class="stat-badge" id="totalCount"
            >📊 <strong>0</strong> Total</span
          >
          <button class="btn-refresh" onclick="refreshData()">⟳ Refresh</button>
          <button class="btn-export" onclick="exportCSV()">
            📥 Export CSV
          </button>
        </div>
      </div>

      <!-- SEARCH -->
      <div class="search-bar">
        <input
          type="text"
          id="searchInput"
          placeholder="🔍 Search by name, email, mobile, course, institution..."
          oninput="filterTable()"
        />
      </div>

      <!-- TABLE -->
      <div class="table-wrapper">
        <!-- Loading -->
        <div id="loadingState" class="loading-state">
          <div class="loading-spinner"></div>
          <span>Loading admissions...</span>
        </div>

        <!-- Error -->
        <div id="errorState" class="error-state" style="display: none">
          <div class="error-icon">⚠️</div>
          <p id="errorMessage">Error loading data</p>
        </div>

        <!-- No Data -->
        <div id="noDataState" class="no-data-state" style="display: none">
          <div class="empty-icon">📭</div>
          <p>No admissions found</p>
          <span style="font-size: 0.8rem; color: var(--text-secondary)"
            >Submit a form to see data here</span
          >
        </div>

        <!-- Table -->
        <table id="admissionsTable" style="display: none">
          <thead>
            <tr>
              <th style="width: 40px">#</th>
              <th>Full Name</th>
              <th>Mobile</th>
              <th>Email</th>
              <th>Course</th>
              <th>Status</th>
              <th>Class</th>
              <th>Institution</th>
              <th style="min-width: 140px">Submitted</th>
              <th style="width: 60px">View</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- View Modal -->
    <div class="modal-overlay" id="viewModal">
      <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-title">👤 Student Details</div>
        <div id="modalBody"></div>
      </div>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      // ============================================================
      // ✅ SUPABASE CREDENTIALS - CORRECT
      // ============================================================
      const supabaseUrl = "https://xahxbhrpsxlrrfyqubud.supabase.co";
      const supabaseKey = "sb_publishable_EadwlJRAR2hzhgXcC3r-Iw_rgp98PUZ";
      const supabaseClient =
        window.supabaseClient ||
        supabase.createClient(supabaseUrl, supabaseKey);

      // ===== STATE =====
      let allData = [];
      let filteredData = [];

      // ===== DOM REFS =====
      const loadingState = document.getElementById("loadingState");
      const errorState = document.getElementById("errorState");
      const errorMessage = document.getElementById("errorMessage");
      const noDataState = document.getElementById("noDataState");
      const admissionsTable = document.getElementById("admissionsTable");
      const tableBody = document.getElementById("tableBody");
      const totalCount = document.getElementById("totalCount");
      const searchInput = document.getElementById("searchInput");

      // ===== HELPERS =====
      function getBadgeClass(status) {
        const map = {
          "School Student": "badge-school",
          "College Student": "badge-college",
          Graduate: "badge-graduate",
        };
        return map[status] || "badge-other";
      }

      function formatDate(dateStr) {
        if (!dateStr) return "-";
        try {
          const d = new Date(dateStr);
          return d.toLocaleDateString("en-IN", {
            day: "2-digit",
            month: "short",
            year: "numeric",
          });
        } catch {
          return dateStr;
        }
      }

      function formatDateTime(dateStr) {
        if (!dateStr) return "-";
        try {
          const d = new Date(dateStr);
          return d.toLocaleDateString("en-IN", {
            day: "2-digit",
            month: "short",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit",
          });
        } catch {
          return dateStr;
        }
      }

      function truncate(text, max = 20) {
        if (!text) return "-";
        return text.length > max ? text.substring(0, max) + "…" : text;
      }

      // ===== VIEW MODAL =====
      function viewDetails(row) {
        const modal = document.getElementById("viewModal");
        const body = document.getElementById("modalBody");

        const fields = [
          { label: "Full Name", value: row.full_name },
          { label: "Mobile", value: row.mobile },
          { label: "Email", value: row.email },
          { label: "Father's Name", value: row.father_name },
          { label: "Parent Phone", value: row.parent_phone },
          { label: "Date of Birth", value: formatDate(row.dob) },
          { label: "Present Address", value: row.present_address },
          { label: "Permanent Address", value: row.permanent_address },
          { label: "Course Applied", value: row.course_applied },
          { label: "Current Status", value: row.current_status },
          { label: "Current Class", value: row.current_class },
          { label: "Stream", value: row.stream },
          { label: "Institution", value: row.institution },
          {
            label: "Declaration Date",
            value: formatDate(row.declaration_date),
          },
          { label: "Signature Name", value: row.signature_name },
          { label: "Submitted On", value: formatDateTime(row.created_at) },
        ];

        body.innerHTML = fields
          .map(
            (f) => `
          <div class="modal-field">
            <span class="modal-field-label">${f.label}</span>
            <span class="modal-field-value">${f.value || "-"}</span>
          </div>
        `,
          )
          .join("");

        modal.classList.add("active");
      }

      function closeModal() {
        document.getElementById("viewModal").classList.remove("active");
      }

      // Close modal on overlay click
      document.getElementById("viewModal").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) closeModal();
      });

      // ===== RENDER TABLE =====
      function renderTable(data) {
        tableBody.innerHTML = "";

        if (!data || data.length === 0) {
          admissionsTable.style.display = "table";
          noDataState.style.display = "block";
          totalCount.innerHTML = `📊 <strong>0</strong> Total`;

          tableBody.innerHTML = `
            <tr>
              <td colspan="10" style="text-align:center;color:var(--text-secondary);padding:2rem;">
                No admissions found — Submit a form to see data here
              </td>
            </tr>
          `;
          return;
        }

        admissionsTable.style.display = "table";
        noDataState.style.display = "none";
        totalCount.innerHTML = `📊 <strong>${data.length}</strong> Total`;

        data.forEach((row, index) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td style="color:var(--text-secondary);font-weight:500;">${index + 1}</td>
            <td><strong>${row.full_name || "-"}</strong></td>
            <td style="font-family:monospace;font-size:0.85rem;">${row.mobile || "-"}</td>
            <td style="color:var(--accent);font-size:0.85rem;">${row.email || "-"}</td>
            <td><span class="badge badge-course">${truncate(row.course_applied || "-", 15)}</span></td>
            <td><span class="badge ${getBadgeClass(row.current_status)}">${row.current_status || "-"}</span></td>
            <td style="font-size:0.85rem;">${row.current_class || "-"}</td>
            <td style="max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:0.85rem;">${row.institution || "-"}</td>
            <td style="font-size:0.75rem;color:var(--text-secondary);white-space:nowrap;">${formatDateTime(row.created_at)}</td>
            <td>
              <button class="view-btn" onclick='viewDetails(${JSON.stringify(row).replace(/'/g, "\\'")})'>
                View
              </button>
            </td>
          `;
          tableBody.appendChild(tr);
        });
      }

      // ===== LOAD DATA =====
      async function loadData() {
        try {
          loadingState.style.display = "flex";
          errorState.style.display = "none";
          noDataState.style.display = "none";
          admissionsTable.style.display = "none";

          console.log("🔄 Fetching data from Supabase...");

          // ✅ FIXED: Using CORRECT table name "admission"
          const { data, error } = await supabaseClient
            .from("admission") // ← CHANGED FROM "admissions" TO "admission"
            .select("*")
            .order("created_at", { ascending: false });

          if (error) {
            if (error.code === "42501") {
              throw new Error(
                "⚠️ PERMISSION DENIED!\n\n" +
                  "Please run these commands in Supabase SQL Editor:\n" +
                  "1. GRANT SELECT ON public.admission TO anon;\n" +
                  "2. GRANT INSERT ON public.admission TO anon;\n\n" +
                  "Then refresh this page.",
              );
            }
            throw error;
          }

          console.log("✅ Data fetched:", data?.length || 0, "records");

          allData = data || [];
          filteredData = [...allData];
          loadingState.style.display = "none";
          renderTable(filteredData);
        } catch (err) {
          console.error("❌ Load error:", err);
          loadingState.style.display = "none";
          errorState.style.display = "block";
          errorMessage.textContent = err.message || "Failed to load data";
          showToast("❌ Error: " + (err.message || "Unknown"), "error");
        }
      }

      // ===== FILTER =====
      window.filterTable = function () {
        const query = searchInput.value.toLowerCase().trim();
        if (!query) {
          filteredData = [...allData];
          renderTable(filteredData);
          return;
        }

        filteredData = allData.filter(
          (row) =>
            (row.full_name && row.full_name.toLowerCase().includes(query)) ||
            (row.email && row.email.toLowerCase().includes(query)) ||
            (row.mobile && row.mobile.includes(query)) ||
            (row.course_applied &&
              row.course_applied.toLowerCase().includes(query)) ||
            (row.institution &&
              row.institution.toLowerCase().includes(query)) ||
            (row.father_name &&
              row.father_name.toLowerCase().includes(query)) ||
            (row.current_status &&
              row.current_status.toLowerCase().includes(query)) ||
            (row.current_class &&
              row.current_class.toLowerCase().includes(query)),
        );
        renderTable(filteredData);
      };

      // ===== REFRESH =====
      window.refreshData = function () {
        loadData();
        showToast("🔄 Refreshed!", "success");
      };

      // ===== EXPORT CSV =====
      window.exportCSV = function () {
        if (!allData || allData.length === 0) {
          showToast("❌ No data to export", "error");
          return;
        }

        const headers = [
          "Full Name",
          "Mobile",
          "Email",
          "Father's Name",
          "Parent Phone",
          "Course",
          "Status",
          "Class",
          "Stream",
          "Institution",
          "Present Address",
          "Permanent Address",
          "DOB",
          "Declaration Date",
          "Signature Name",
          "Submitted Date",
        ];

        const rows = allData.map((row) => [
          row.full_name || "",
          row.mobile || "",
          row.email || "",
          row.father_name || "",
          row.parent_phone || "",
          row.course_applied || "",
          row.current_status || "",
          row.current_class || "",
          row.stream || "",
          row.institution || "",
          row.present_address || "",
          row.permanent_address || "",
          formatDate(row.dob) || "",
          formatDate(row.declaration_date) || "",
          row.signature_name || "",
          formatDateTime(row.created_at) || "",
        ]);

        let csv = headers.join(",") + "\n";
        rows.forEach((row) => {
          csv +=
            row
              .map((cell) => `"${String(cell).replace(/"/g, '""')}"`)
              .join(",") + "\n";
        });

        const blob = new Blob(["\uFEFF" + csv], {
          type: "text/csv;charset=utf-8",
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `admissions_${new Date().toISOString().split("T")[0]}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        showToast("✅ CSV exported successfully!", "success");
      };

      // ===== TOAST =====
      function showToast(message, type = "success") {
        const existing = document.querySelector(".admin-toast");
        if (existing) existing.remove();

        const toast = document.createElement("div");
        toast.className = `admin-toast ${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);

        setTimeout(() => {
          toast.style.opacity = "0";
          toast.style.transition = "opacity 0.3s";
          setTimeout(() => toast.remove(), 300);
        }, 5000);
      }

      // ===== AUTO REFRESH every 30 seconds =====
      let refreshInterval = setInterval(loadData, 30000);

      // ===== INIT =====
      loadData();

      window.addEventListener("beforeunload", () => {
        clearInterval(refreshInterval);
      });

      window.showToast = showToast;
      window.viewDetails = viewDetails;
      window.closeModal = closeModal;
    </script>
  </body>
</html>
